# =============================================================================
# configs/local.yaml —— 本机专属配置（不提交 git，每台机器单独维护）
# =============================================================================
# 【使用方法】
#   1. 把本文件复制一份并重命名：
#        cp configs/local.example.yaml configs/local.yaml
#   2. 取消你需要覆盖的行的注释（删掉行首的 #），填入本机实际值。
#   3. 没有列出的字段继续沿用 default.yaml 里的值，不需要全部填写。
#
# 【优先级】
#   default.yaml < local.yaml（本文件）< 环境变量 CITRANSFORMER_*
#
# 【路径格式】
#   - 绝对路径：原样使用（推荐数据集在项目目录外时使用）
#   - 相对路径：自动相对于项目根目录（CiTransformer/）解析
# =============================================================================

paths:
  # ------------------------------------------------------------------
  # 【主数据目录】训练/验证时读取的已处理数据集。
  # 如果你的数据集在项目目录外，填绝对路径。
  # 示例（服务器）：/mnt/datasets/citransformer/processed_long_no_wind_2015_2022
  # 示例（本机）：/Users/yourname/data/citransformer/processed_long_no_wind_2015_2022
  # ------------------------------------------------------------------
  # data_dir: /mnt/datasets/citransformer/processed_long_no_wind_2015_2022

  # ------------------------------------------------------------------
  # 【原始输入文件】预处理时读取的原始 CSV，填绝对路径。
  # ------------------------------------------------------------------
  # raw_input_file: /mnt/datasets/citransformer/raw/91-Site_DKA-M9_B-Phase.csv

  # ------------------------------------------------------------------
  # 【实验结果根目录】所有结果图表和指标的输出位置。
  # 修改这一行后，各模型子目录（results.lstm / results.itransformer 等）
  # 会由代码自动推导，不需要逐一修改。
  # ------------------------------------------------------------------
  # results_root: /mnt/experiments/citransformer/results

  # ------------------------------------------------------------------
  # 【检查点根目录】训练好的模型权重保存位置。
  # 修改这一行后，各模型子目录（checkpoints.lstm 等）自动推导。
  # ------------------------------------------------------------------
  # checkpoints_root: /mnt/experiments/citransformer/checkpoints

  # ------------------------------------------------------------------
  # 【matplotlib 缓存目录】多进程训练时建议改到 /tmp 下避免权限冲突。
  # ------------------------------------------------------------------
  # matplotlib_cache: /tmp/citransformer-matplotlib

runtime:
  # ------------------------------------------------------------------
  # 【计算设备】
  # auto  → 自动检测（推荐，大多数情况保持此默认值即可）
  # cuda  → NVIDIA GPU（服务器 / 云端 A100、V100 等）
  # mps   → Apple Silicon GPU（M1/M2/M3 Mac 本地训练）
  # cpu   → 强制使用 CPU
  # ------------------------------------------------------------------
  # device: cuda

  # ------------------------------------------------------------------
  # 【数据加载线程数】
  # 0     → 单线程（调试方便，Windows 必须用 0）
  # 4~8   → 多核服务器或 Mac 可调大，加速数据读取
  # ------------------------------------------------------------------
  # num_workers: 4

  # ------------------------------------------------------------------
  # 【Python 解释器路径】
  # 留空或不填 → 使用当前激活的 conda/venv 环境中的 python
  # 填写绝对路径 → 强制使用指定解释器（多环境服务器上有用）
  # 示例：/opt/conda/envs/citransformer/bin/python
  # ------------------------------------------------------------------
  # python_bin: /opt/conda/envs/citransformer/bin/python
